version: 2

sources:
  - name: silver
    database: iceberg
    schema: silver
    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}
    loaded_at_field: _silver_processed_at

    tables:
      - name: who_gho_silver
        description: "WHO disease indicators — cleaned and deduplicated"
        columns:
          - name: indicator_code
            tests: [not_null]
          - name: country_code
            tests: [not_null]
          - name: year
            tests: [not_null]

      - name: cdc_nndss_silver
        description: "CDC notifiable disease weekly counts"
        columns:
          - name: condition
            tests: [not_null]
          - name: reporting_area
            tests: [not_null]

      - name: owid_covid_silver
        description: "Our World in Data COVID metrics"
        columns:
          - name: iso_code
            tests: [not_null]
          - name: date
            tests: [not_null]

      - name: owid_vaccination_silver
        description: "Our World in Data vaccination coverage"
        columns:
          - name: iso_code
            tests: [not_null]

      - name: fred_unrate_silver
        description: "FRED unemployment rate"
      - name: fred_cpiaucsl_silver
        description: "FRED CPI inflation"
      - name: fred_dgs10_silver
        description: "FRED 10-year treasury yield"

      - name: openfda_drug_event_silver
        description: "OpenFDA adverse drug event reports"
        columns:
          - name: drug_name
            tests: [not_null]
          - name: report_id
            tests: [not_null]